name: CI/CD Security And Image Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  IMAGE_REPOSITORY: aq496/hrm-ipinfra-system

jobs:
  gitleaks:
    name: Step 1 - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sonarcloud:
    name: Step 2 - SonarCloud
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SonarCloud configuration
        continue-on-error: true
        run: |
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_PROJECT_KEY}" ] || [ -z "${SONAR_ORGANIZATION}" ]; then
            echo "Missing SonarCloud configuration."
            echo "Set SONAR_TOKEN as a repository secret."
            echo "Set SONAR_PROJECT_KEY and SONAR_ORGANIZATION as repository variables."
            exit 1
          fi

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.exclusions=uploads/**,.github/**
            -Dsonar.qualitygate.wait=true

  dependency-check:
    name: Step 3 - OWASP Dependency-Check
    runs-on: ubuntu-latest
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: .cache/dependency-check
          key: dependency-check-${{ runner.os }}
          restore-keys: |
            dependency-check-${{ runner.os }}

      - name: Run OWASP Dependency-Check
        continue-on-error: true
        run: |
          mkdir -p reports/dependency-check
          mkdir -p .cache/dependency-check
          EXTRA_ARGS=""
          if [ -n "${NVD_API_KEY}" ]; then
            EXTRA_ARGS="--nvdApiKey ${NVD_API_KEY}"
          fi

          docker run --rm \
            -v "${PWD}:/src" \
            -v "${PWD}/reports/dependency-check:/report" \
            -v "${PWD}/.cache/dependency-check:/usr/share/dependency-check/data" \
            owasp/dependency-check:12.1.8 \
            --scan /src \
            --out /report \
            --format HTML \
            --format JSON \
            --project hrm2 \
            --failOnCVSS 7 \
            ${EXTRA_ARGS}

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/dependency-check

  resolve-image-version:
    name: Resolve Docker Tag
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - sonarcloud
      - dependency-check
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
      image_ref: ${{ steps.version.outputs.image_ref }}
    steps:
      - name: Resolve next Docker image tag
        id: version
        run: |
          set -euo pipefail
          response="$(curl -fsSL "https://hub.docker.com/v2/repositories/${IMAGE_REPOSITORY}/tags?page_size=100" || true)"

          if [ -n "${response}" ]; then
            latest_numeric_tag="$(
              echo "${response}" \
                | jq -r '.results[].name' \
                | grep -E '^v[0-9]+$' \
                | sed 's/^v//' \
                | sort -n \
                | tail -1 || true
            )"
          else
            latest_numeric_tag=""
          fi

          if [ -z "${latest_numeric_tag}" ]; then
            next_tag_number=2
          else
            next_tag_number=$((latest_numeric_tag + 1))
          fi

          image_tag="v${next_tag_number}"
          image_ref="${IMAGE_REPOSITORY}:${image_tag}"

          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

          echo "Resolved image tag: ${image_tag}"
          echo "Resolved image ref: ${image_ref}"

  build-image:
    name: Step 4 - Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - resolve-image-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t "${{ needs.resolve-image-version.outputs.image_ref }}" .

      - name: Save Docker image artifact
        run: |
          mkdir -p dist
          docker save "${{ needs.resolve-image-version.outputs.image_ref }}" -o dist/hrm-ipinfra-system.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ needs.resolve-image-version.outputs.image_tag }}
          path: dist/hrm-ipinfra-system.tar

  trivy-image-scan:
    name: Step 5 - Trivy Image Scan
    runs-on: ubuntu-latest
    needs:
      - build-image
      - resolve-image-version
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.resolve-image-version.outputs.image_tag }}
          path: dist

      - name: Load Docker image
        run: |
          docker load -i dist/hrm-ipinfra-system.tar

      - name: Run Trivy image scan
        continue-on-error: true
        run: |
          mkdir -p reports/trivy
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}/reports/trivy:/report" \
            aquasec/trivy:latest \
            image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output /report/trivy-image-results.sarif \
            --exit-code 1 \
            "${{ needs.resolve-image-version.outputs.image_ref }}"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: reports/trivy

  push-image:
    name: Step 6 - Push Safe Image To Docker Hub
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs:
      - trivy-image-scan
      - resolve-image-version
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.resolve-image-version.outputs.image_tag }}
          path: dist

      - name: Load Docker image
        run: |
          docker load -i dist/hrm-ipinfra-system.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push versioned image
        run: |
          docker push "${{ needs.resolve-image-version.outputs.image_ref }}"

      - name: Push latest image
        run: |
          docker tag "${{ needs.resolve-image-version.outputs.image_ref }}" "${IMAGE_REPOSITORY}:latest"
          docker push "${IMAGE_REPOSITORY}:latest"
